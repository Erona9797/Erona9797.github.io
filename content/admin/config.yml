backend:
  name: github
  repo: Erona9797/Erona9797.github.io
  branch: main

media_folder: "content/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "content"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "內容", name: "body", widget: "markdown" }